name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Build static site
        run: |
          rm -rf docs
          mkdir -p docs
          cp -r SCADA/index.html SCADA/js SCADA/css SCADA/Acceso_seguro SCADA/assets docs/
          cp -r SCADA/*.ico SCADA/*.png SCADA/*.svg docs/ 2>/dev/null || true
          touch docs/.nojekyll
          V=$(date +%s)
          sed -i -E "s/(\.(js|css))(\"|')/\1?v=$V\3/g" docs/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
